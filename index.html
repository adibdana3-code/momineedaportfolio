<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Dana Adib — portfolio d'architecture. Espaces, matière et récit." />

    <!-- SPA fallback GitHub Pages : restaure l'URL encodée par 404.html -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

    <!-- Typographie « Magazine Éditorial » :
         Playfair Display (titres display, regular + italic) + Space Grotesk (UI)
         + Reem Kufi (nom & titres arabes — chargé en permanence). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;0,900;1,400;1,600;1,800&family=Reem+Kufi:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Statistiques Umami (sans cookie, conforme RGPD → pas de bannière).
         URL absolue vers le cloud Umami : Vite ne la réécrit pas, elle reste
         donc valide une fois le site buildé et publié sous le sous-chemin
         GitHub Pages (/momineedaportfolio/). `defer` : ne bloque pas le rendu.
         Umami suit de lui-même les changements d'URL de la SPA (History API),
         chaque page projet est donc comptée séparément. -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="4a812f8e-fafa-406b-a004-809150b2e80f"
    ></script>

    <title>Dana Adib — Architecture</title>

    <link rel="stylesheet" crossorigin href="/momineedaportfolio/assets/index-BK7jGjPH.css">
  </head>
