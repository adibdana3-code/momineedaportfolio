<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Dana Adib — Architecture</title>
    <!--
      SPA fallback pour GitHub Pages (technique rafgraph/spa-github-pages).
      Encode le chemin demandé et redirige vers index.html, qui le restaure.
      pathSegmentsToKeep : 1 pour un "project site" (user.github.io/<repo>/),
      0 pour un "user/org site" (user.github.io/). À ajuster au déploiement.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
